name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out all sections.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimum code to reproduce the issue.
      placeholder: |
        from openquote import QuoteAgent
        from openquote.mcp.mock import MockERP
        agent = QuoteAgent(erp=MockERP())
        # ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: openquote version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: erp
    attributes:
      label: ERP backend
      options:
        - Mock (no real ERP)
        - Epicor Kinetic
        - SAP ECC / S/4HANA
        - Oracle Cloud SCM
        - Microsoft Dynamics 365
        - Not applicable
    validations:
      required: true
