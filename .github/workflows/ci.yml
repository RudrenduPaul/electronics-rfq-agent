name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/ --strict

      - name: Tests with coverage
        run: uv run pytest tests/ --cov=src --cov-report=xml --cov-fail-under=80
        env:
          ERFA_USE_MOCK: "true"
          ANTHROPIC_API_KEY: "test-key-not-real"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          fail_ci_if_error: false

      - name: Security scan
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  extras-compat:
    name: Optional extras (${{ matrix.extra }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: langchain
          - extra: agents

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install core + extra
        run: uv sync --extra dev --extra ${{ matrix.extra }}

      - name: Smoke test import (langchain)
        if: matrix.extra == 'langchain'
        run: |
          uv run python -c "
          import langgraph
          from electronics_rfq_agent import QuoteAgent
          from electronics_rfq_agent.mcp.mock import MockERP
          print('langchain extra OK')
          "

      - name: Smoke test import (agents)
        if: matrix.extra == 'agents'
        run: |
          uv run python -c "
          from agents import Agent, function_tool
          from electronics_rfq_agent import QuoteAgent
          from electronics_rfq_agent.mcp.mock import MockERP
          print('agents extra OK')
          "
