services:
  electronics-rfq-agent:
    build: .
    environment:
      - ERFA_USE_MOCK=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ERFA_MODEL=${ERFA_MODEL:-claude-sonnet-4-6}
    volumes:
      - ./rfqs:/app/rfqs:ro
    ports:
      - "8000:8000"
    depends_on:
      - mock-erp
    restart: unless-stopped

  mock-erp:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app:ro
    command: >
      bash -c "pip install -q pydantic>=2.7 httpx>=0.27 &&
               PYTHONPATH=/app/src python -c '
from electronics_rfq_agent.mcp.mock.backend import MockERP
import asyncio, json
print(\"Mock ERP backend ready with 200 parts\")
asyncio.run(asyncio.sleep(86400))
'"
