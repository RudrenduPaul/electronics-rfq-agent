services:
  openquote:
    build: .
    environment:
      - OPENQUOTE_USE_MOCK=true
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENQUOTE_MODEL=${OPENQUOTE_MODEL:-claude-sonnet-4-6}
    volumes:
      - ./rfqs:/app/rfqs:ro
    ports:
      - "8000:8000"
    depends_on:
      - mock-erp
    restart: unless-stopped

  mock-erp:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app:ro
    command: >
      bash -c "pip install -q pydantic>=2.7 httpx>=0.27 &&
               PYTHONPATH=/app python -c '
from openquote.mcp.mock.backend import MockERP
import asyncio, json
print(\"Mock ERP backend ready with 200 parts\")
asyncio.run(asyncio.sleep(86400))
'"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "print(\"ok\")"]
      interval: 10s
      timeout: 5s
      retries: 3
